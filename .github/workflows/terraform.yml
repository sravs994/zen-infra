name: Terraform Infrastructure

# Push/PR to main on envs/dev/** or modules/** → auto plan+apply for dev
# Manual dispatch → choose environment (dev / qa / prod) + action (plan / apply / destroy)

on:
  push:
    branches: [main]
    paths:
      - 'envs/dev/**'
      - 'modules/**'
  pull_request:
    branches: [main]
    paths:
      - 'envs/dev/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]
      confirm_destroy:
        description: 'Type "destroy" to confirm destruction (required when action=destroy)'
        required: false
        default: ''

permissions:
  contents: read

env:
  TF_VERSION: '1.10.0'
  AWS_REGION: us-east-1
  # For push/PR auto-triggers, target is always dev.
  # For workflow_dispatch, use the selected environment.
  TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}

# Prevent parallel runs on the same branch — avoids state conflicts
concurrency:
  group: terraform-${{ github.ref }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  # ── Plan ──────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="db_password=${{ secrets[format('{0}_DB_PASSWORD', upper(env.TARGET_ENV))] }}" \
            -var="jwt_secret=${{ secrets[format('{0}_JWT_SECRET', upper(env.TARGET_ENV))] }}" \
            -var="github_org=${{ vars.GH_ORG }}" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Release state lock on failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ env.TARGET_ENV }}/terraform.tfstate.tflock || true

      - name: Upload plan file
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: envs/${{ env.TARGET_ENV }}/tfplan
          retention-days: 1

  # ── Apply ─────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: envs/${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Download plan file
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.TARGET_ENV }}
          path: envs/${{ env.TARGET_ENV }}

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -no-color \
            tfplan

      - name: Release state lock on failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ env.TARGET_ENV }}/terraform.tfstate.tflock || true

  # ── Destroy ───────────────────────────────────────────────────────────────
  destroy:
    name: Terraform Destroy (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'destroy'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: envs/${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="db_password=${{ secrets[format('{0}_DB_PASSWORD', upper(env.TARGET_ENV))] }}" \
            -var="jwt_secret=${{ secrets[format('{0}_JWT_SECRET', upper(env.TARGET_ENV))] }}" \
            -var="github_org=${{ vars.GH_ORG }}" \
            -auto-approve \
            -no-color

      - name: Release state lock on failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ env.TARGET_ENV }}/terraform.tfstate.tflock || true
